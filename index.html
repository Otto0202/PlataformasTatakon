
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tatake Plataformas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<style>
body{
margin:0;
background:url("https://i.imgur.com/MYZ6UiM.jpeg") no-repeat center center;
background-size:cover;
font-family:sans-serif;
}

.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
padding:20px;
}

.logo{
width:230px;
margin:auto;
display:block;
}

.titulo{
text-align:center;
font-size:2rem;
font-weight:900;
color:#ff3b3b;
text-shadow:0 0 10px red;
}

.card{
background:#111;
border-radius:12px;
padding:12px;
color:white;
}

.product-img{
width:100%;
height:130px;
object-fit:cover;
border-radius:8px;
}

.btn{
background:#22c55e;
padding:8px;
border-radius:6px;
width:100%;
margin-top:8px;
}

.floating{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:14px;
border-radius:50px;
color:white;
cursor:pointer;
}

.counter{
background:red;
border-radius:50%;
padding:2px 6px;
font-size:12px;
margin-left:5px;
}

/* 🔥 MODAL PRO */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:15px;
border-radius:10px;
width:90%;
max-width:350px;
max-height:80vh;
overflow-y:auto; /* 🔥 SCROLL */
}
</style>
</head>

<body>

<!-- MODAL IMPORTANTE -->
<div id="welcomeModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
  <div class="bg-white p-6 rounded text-center max-w-sm">
    
    <h2 class="text-xl font-extrabold text-red-600 mb-3 flex items-center justify-center gap-2">
      🚨 IMPORTANTE
    </h2>

    <p class="text-gray-800 text-base font-semibold mb-4">
      Cada producto está sujeto a <span class="text-red-600 font-bold">disponibilidad</span>, 
      esperar respuesta de confirmación antes de 
      <span class="font-bold">cancelar el valor</span> del producto.
    </p>

    <p class="text-sm text-gray-600">
      Por favor, verifica que te funciona la cuenta después de la venta.
    </p>

    <button onclick="closeAlertModal()" class="bg-blue-600 text-white px-6 py-2 rounded mt-3">
      Aceptar
    </button>

  </div>
</div>

<div class="overlay">

<img src="https://imgur.com/kd7PZm2.png" class="logo">
<h1 class="titulo">Tatake Plataformas</h1>

<div id="productos" class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-5"></div>

</div>

<div class="floating" onclick="openCart()">
🛒 <span id="contador" class="counter">0</span>
</div>

<div id="cartModal" class="modal">
<div class="modal-content">
<h2 class="text-center font-bold mb-2">Tu pedido</h2>
<div id="cartItems"></div>

<button onclick="checkout()" class="bg-green-500 text-white w-full mt-3 p-2 rounded">
Enviar por WhatsApp
</button>

<button onclick="closeCart()" class="w-full mt-2 p-2 bg-gray-300 rounded">
Cerrar
</button>
</div>
</div>

<script src="index.js"></script>
</body>
</html>
